<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>markast documentación</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/site.css">
  <link rel="stylesheet" id="hljs-theme" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>

  <!-- ── Sidebar ─────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-header">
      <a class="brand" href="#">
        <span class="brand-icon"><img src="assets/logo.svg" alt="" width="18" height="18"></span>
        <span class="brand-name">markast</span>
        <span class="brand-badge">docs</span>
      </a>
      <button class="icon-btn sidebar-close-btn" id="sidebarClose" aria-label="Cerrar menú" title="Cerrar">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="sidebar-search-wrap">
      <label class="sidebar-search">
        <img src="assets/icons/search.svg" class="search-icon" alt="">
        <input type="search" id="searchInput" class="search-input" placeholder="Buscar en la documentación…" autocomplete="off" spellcheck="false">
        <kbd class="search-kbd">/</kbd>
      </label>
    </div>

    <nav class="sidebar-nav" id="sidebarNav" aria-label="Documentación"></nav>

    <div class="sidebar-footer">
      <span class="sidebar-footer-text">markast Flutter</span>
    </div>

  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ── Main ───────────────────────────────────────────────────── -->
  <div class="layout-main">

    <header class="topbar" id="topbar">
      <div class="topbar-start">
        <button class="icon-btn sidebar-toggle" id="sidebarToggle" aria-label="Abrir menú">
          <img src="assets/icons/menu.svg" alt="">
        </button>
        <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>
      </div>
      <div class="topbar-end">
        <button class="icon-btn" id="themeToggle" aria-label="Cambiar tema" title="Cambiar tema">
          <img src="assets/icons/moon.svg" class="icon-moon" alt="modo oscuro">
          <img src="assets/icons/sun.svg"  class="icon-sun"  alt="modo claro">
        </button>
        <div class="topbar-divider"></div>
        <a class="topbar-brand" href="#">
          <img src="assets/logo.svg" alt="" width="15" height="15">
          <span>markast</span>
        </a>
      </div>
    </header>

    <div class="content-layout">

      <main class="content-main" id="contentMain">
        <article class="article-body" id="articleBody">
          <div class="skeleton-wrap">
            <div class="skeleton skeleton-h1"></div>
            <div class="skeleton skeleton-p"></div>
            <div class="skeleton skeleton-p short"></div>
            <div class="skeleton skeleton-block"></div>
          </div>
        </article>
        <div class="article-footer" id="articleFooter"></div>
      </main>

      <aside class="toc-panel" id="tocPanel">
        <div class="toc-inner">
          <p class="toc-label">En esta página</p>
          <nav class="toc-nav" id="tocNav"></nav>
        </div>
      </aside>

    </div>
  </div>

  <script src="assets/site.js"></script>
</body>
</html>
